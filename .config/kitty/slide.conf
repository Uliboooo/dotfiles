include kitty.conf
include themes/rose-pine-dawn.conf

font_size 14
font_family      family='JetBrains Mono' style=Bold
bold_font        auto
italic_font      auto
bold_italic_font auto
symbol_map U+3040-U+30FF,U+4E00-U+9FFF BIZ UDGothic

env TERM_BACKGROUND=light

background_opacity 1
listen_on unix:/tmp/mykitty_slide
