general {
    gaps_in = 3
    gaps_out = 8

    border_size = 2

    layout = dwindle

    col.active_border   = rgba(89b4faaa)
    col.inactive_border = rgba(ffffff18)
}

decoration {
    rounding = 12

    active_opacity = 1.0
    inactive_opacity = 1.0
    fullscreen_opacity = 1.0

    blur {
        enabled = false
        size = 1
        passes = 1
        new_optimizations = true
        ignore_opacity = true
        xray = true
    }
    shadow {
        enabled = false
    }
    dim_inactive = false
    dim_strength = 0.08
}

# windowrule = match:class ^(com.mitchellh.ghostty)$, opacity 0.94 0.98
windowrule = match:title .*YouTube.*, no_dim on

animations {
    enabled = true

    bezier = expo,    0.16, 1,    0.3,  1
    bezier = back,    0.34, 1.56, 0.64, 1
    bezier = linear,  0,    0,    1,    1
    bezier = snap,    0.19, 1,    0.22, 1


    animation = windows,     1, 6, expo, popin 70%
    animation = windowsOut,  1, 5, snap, popin 80%
    animation = windowsMove, 1, 4, expo


    animation = border,      1, 8,   default
    # animation = borderangle, 1, 120, linear, loop


    animation = fade,        1, 4, expo
    animation = fadeDim,     1, 4, expo

    animation = workspaces,        1, 4, expo, slide
    animation = specialWorkspace,  1, 4, expo, slidevert
}
