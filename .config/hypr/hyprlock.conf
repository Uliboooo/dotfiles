general {
    disable_loading_bar = true
    hide_cursor = true
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 3
    dots_size = 0.2
    dots_spacing = 0.15
    dots_center = true
    dots_rounding = -1
    outer_color = rgba(245, 194, 231, 0.6)
    inner_color = rgba(24, 24, 37, 0.4)
    font_color = rgb(205, 214, 244)
    fade_on_empty = false
    fade_timeout = 1000
    placeholder_text = <i>Input Password...</i>
    hide_input = false
    rounding = 10
    check_color = rgba(166, 227, 161, 0.6)
    fail_color = rgba(243, 139, 168, 0.6)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    fail_transition = 300
    capslock_color = rgba(250, 179, 135, 0.6)
    numlock_color = -1
    bothlock_color = -1
    invert_numlock = false
    swap_font_color = false
    position = 0, -120
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = rgb(203, 166, 247)
    font_size = 120
    font_family = 0xProto Nerd Font Mono ExtraBold
    position = 0, 160
    halign = center
    valign = center
    shadow_passes = 2
}

label {
    monitor =
    text = cmd[update:43200000] echo "$(date +"%A, %d %B %Y")"
    color = rgb(205, 214, 244)
    font_size = 24
    font_family = 0xProto Nerd Font
    position = 0, 50
    halign = center
    valign = center
    shadow_passes = 1
}

label {
    monitor =
    text = Welcome back, $USER
    color = rgb(245, 194, 231)
    font_size = 18
    font_family = 0xProto Nerd Font
    position = 0, -70
    halign = center
    valign = center
}

auth {
    fingerprint:enabled = true
    fingerprint:ready_message = <span foreground="##a6e3a1">(scan fingerprint)</span>
    fingerprint:present_message = <span foreground="##89b4fa">authenticating...</span>
    fingerprint:failed_message = <span foreground="##f38ba8">authentication failed</span>
}

# ══════════════════════════════════════════════════
# MPRIS Media Player Widget
# ══════════════════════════════════════════════════

shape {
    monitor =
    size = 500, 140
    color = rgba(24, 24, 37, 0.72)
    rounding = 14
    border_size = 1
    border_color = rgba(203, 166, 247, 0.25)
    position = 0, -251
    halign = center
    valign = center
    zindex = 0
}

# play status
label {
    monitor =
    text = cmd[update:2000] ~/dotfiles/script/mpris.sh status
    color = rgba(203, 166, 247, 0.8)
    font_size = 11
    font_family = 0xProto Nerd Font
    position = 0, -191
    halign = center
    valign = center
    zindex = 1
}

# title
label {
    monitor =
    text = cmd[update:2000] ~/dotfiles/script/mpris.sh title
    color = rgb(205, 214, 244)
    font_size = 15
    font_family = 0xProto Nerd Font Bold
    position = 0, -213
    halign = center
    valign = center
    zindex = 1
}

# artist
label {
    monitor =
    text = cmd[update:2000] ~/dotfiles/script/mpris.sh artist
