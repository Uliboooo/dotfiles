# hyprland.conf

###################################
#  РЋћРЋљРЋЌ РЋћРЋљРЋЌ РЋћРЋдРЋЌ      РЋћРЋљРЋЌ РЋћРЋЌРЋћ РЋд  РЋд  #
#  РЋџРЋљРЋЌ РЋЉРЋБ   РЋЉ       РЋЉРЋБ  РЋЉРЋЉРЋЉ РЋџРЋЌРЋћРЋЮ  #
#  РЋџРЋљРЋЮ РЋџРЋљРЋЮ  РЋЕ       РЋџРЋљРЋЮ РЋЮРЋџРЋЮ  РЋџРЋЮ   #
###################################

env = MOZ_ENABLE_WAYLAND,1
env = GDK_BACKEND,wayland,x11,*

env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1

env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,Wayland
env = XCURSOR_THEME,Bibata-Modern-Ice
env = XCURSOR_SIZE,20

env = HYPRSHOT_DIR,$HOME/Pictures/Screenshots

env = ELECTRON_OZONE_PLATFORM_HINT,wayland

env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

env = GTK_USE_PORTAL,1

ipc = on

#################
#  РЋд РЋћРЋЌРЋћ РЋд РЋћРЋдРЋЌ  #
#  РЋЉ РЋЉРЋЉРЋЉ РЋЉ  РЋЉ   #
#  РЋЕ РЋЮРЋџРЋЮ РЋЕ  РЋЕ   #
#################

# exec-once = awww-daemon
exec-once = swww-daemon
exec-once = sh ~/dotfiles/script/cycle_wallpaper.sh
exec-once = sh ~/dotfiles/script/launch-waybar.sh
exec-once = swaync
exec-once = fcitx5
exec-once = hypridle
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = hyprctl setcursor Bibata-Modern-Ice 24
# exec-once = /usr/lib/xdg-desktop-portal-hyprland
# exec-once = /usr/lib/xdg-desktop-portal-gtk
# exec-once = sh ~/dotfiles/script/xdg-portal-init.sh
# exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = gnome-keyring-daemon --start --components=secrets

exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user stop xdg-desktop-portal xdg-desktop-portal-hyprland xdg-desktop-portal-wlr xdg-desktop-portal-gtk
exec-once = systemctl --user start xdg-desktop-portal-hyprland
exec-once = systemctl --user start xdg-desktop-portal

###################################
#  РЋћРЋдРЋЌ РЋћРЋљРЋЌ РЋћРЋЌРЋћ РЋд РЋћРЋдРЋЌ РЋћРЋљРЋЌ РЋдРЋљРЋЌ РЋћРЋљРЋЌ  #
#  РЋЉРЋЉРЋЉ РЋЉ РЋЉ РЋЉРЋЉРЋЉ РЋЉ  РЋЉ  РЋЉ РЋЉ РЋаРЋдРЋЮ РЋџРЋљРЋЌ  #
#  РЋЕ РЋЕ РЋџРЋљРЋЮ РЋЮРЋџРЋЮ РЋЕ  РЋЕ  РЋџРЋљРЋЮ РЋЕРЋџРЋљ РЋџРЋљРЋЮ  #
###################################

# toggle x2 and x1.5

# monitor = eDP-1, 1920x1200, 0x1080, 1.0
# monitor = DP-1, 3840x2160, 0x0, 2.0

# or

monitor = eDP-1, 1920x1200, 320x1440, 1.0
monitor = DP-1, 3840x2160, 0x0, 1.5

##################################################
#  РЋћРЋдРЋЌ РЋд РЋд      РЋћРЋљРЋЌ РЋдРЋљРЋЌ РЋћРЋљРЋЌ РЋћРЋљРЋЌ РЋдРЋљРЋЌ РЋћРЋљРЋЌ РЋћРЋдРЋЌ РЋћРЋљРЋЌ  #
#  РЋЉРЋЉРЋЉ РЋџРЋдРЋЮ      РЋаРЋљРЋЮ РЋаРЋдРЋЮ РЋЉ РЋЉ РЋЉ РЋд РЋаРЋдРЋЮ РЋаРЋљРЋБ РЋЉРЋЉРЋЉ РЋџРЋљРЋЌ  #
#  РЋЕ РЋЕ  РЋЕ       РЋЕ   РЋЕРЋџРЋљ РЋџРЋљРЋЮ РЋџРЋљРЋЮ РЋЕРЋџРЋљ РЋЕ РЋЕ РЋЕ РЋЕ РЋџРЋљРЋЮ  #
##################################################

$terminal = ghostty
$fileManager = nautilus
$menu = fuzzel

#######################################################
#  РЋд  РЋд РЋд РЋћРЋљРЋЌ РЋд РЋд РЋћРЋљРЋЌ РЋд        РЋћРЋдРЋЌ РЋћРЋљРЋЌ РЋћРЋљРЋЌ РЋд РЋћРЋљРЋЌ РЋћРЋЌРЋћ  #
#  РЋџРЋЌРЋћРЋЮ РЋЉ РЋџРЋљРЋЌ РЋЉ РЋЉ РЋаРЋљРЋБ РЋЉ         РЋЉРЋЉ РЋЉРЋБ  РЋџРЋљРЋЌ РЋЉ РЋЉ РЋд РЋЉРЋЉРЋЉ  #
#   РЋџРЋЮ  РЋЕ РЋџРЋљРЋЮ РЋџРЋљРЋЮ РЋЕ РЋЕ РЋЕРЋљРЋЮ      РЋљРЋЕРЋЮ РЋџРЋљРЋЮ РЋџРЋљРЋЮ РЋЕ РЋџРЋљРЋЮ РЋЮРЋџРЋЮ  #
#######################################################

source = ./visual.conf

#############################
#  РЋд   РЋћРЋљРЋЌ РЋд РЋд РЋћРЋљРЋЌ РЋд РЋд РЋћРЋдРЋЌ  #
#  РЋЉ   РЋаРЋљРЋБ РЋџРЋдРЋЮ РЋЉ РЋЉ РЋЉ РЋЉ  РЋЉ   #
#  РЋЕРЋљРЋЮ РЋЕ РЋЕ  РЋЕ  РЋџРЋљРЋЮ РЋџРЋљРЋЮ  РЋЕ   #
#############################

dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
    force_split = 2
}

misc {
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
    vfr = true
    disable_splash_rendering = true
    col.splash = 0xffffff00
}

#######################################################
#  РЋд РЋћРЋЌРЋћ РЋћРЋљРЋЌ РЋд РЋд РЋћРЋдРЋЌ      РЋћРЋдРЋЌ РЋћРЋљРЋЌ РЋд  РЋд РЋд РЋћРЋљРЋЌ РЋћРЋљРЋЌ РЋћРЋљРЋЌ  #
#  РЋЉ РЋЉРЋЉРЋЉ РЋаРЋљРЋЮ РЋЉ РЋЉ  РЋЉ        РЋЉРЋЉ РЋЉРЋБ  РЋџРЋЌРЋћРЋЮ РЋЉ РЋЉ   РЋЉРЋБ  РЋџРЋљРЋЌ  #
#  РЋЕ РЋЮРЋџРЋЮ РЋЕ   РЋџРЋљРЋЮ  РЋЕ       РЋљРЋЕРЋЮ РЋџРЋљРЋЮ  РЋџРЋЮ  РЋЕ РЋџРЋљРЋЮ РЋџРЋљРЋЮ РЋџРЋљРЋЮ  #
#######################################################


input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options = ctrl:swap_lalt_lctl,ctrl:swap_ralt_rctl,caps:super
    kb_rules =

    natural_scroll = yes

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    repeat_delay = 230
    repeat_rate = 42

    touchpad {
        natural_scroll = false
        scroll_factor = 0.5
    }
}

# See https://wiki.hypr.land/Configuring/Gestures
gesture = 3, horizontal, workspace

# Example per-device config
# See https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

device {
    name = xctech-usb-gaming-mouse
    sensitivity = -0.5
}

device {
    name = xctech-usb-gaming-mouse-keyboard-1
    sensitivity = -0.5
}

device {
    # thinkpad touchpad
    name = elan06c7:00-04f3:3193-touchpad
    accel_profile = custom
    natural_scroll = true
    sensitivity = 0.5
}

#############################################
#  РЋдРЋћРЋљ РЋћРЋљРЋЌ РЋд РЋд РЋћРЋЌ  РЋд РЋћРЋЌРЋћ РЋћРЋдРЋЌ РЋд РЋћРЋЌРЋћ РЋћРЋљРЋЌ РЋћРЋљРЋЌ  #
#  РЋаРЋЕРЋЌ РЋЉРЋБ  РЋџРЋдРЋЮ РЋаРЋЕРЋЌ РЋЉ РЋЉРЋЉРЋЉ  РЋЉРЋЉ РЋЉ РЋЉРЋЉРЋЉ РЋЉ РЋд РЋџРЋљРЋЌ  #
#  РЋЕ РЋЕ РЋџРЋљРЋЮ  РЋЕ  РЋџРЋљРЋЮ РЋЕ РЋЮРЋџРЋЮ РЋљРЋЕРЋЮ РЋЕ РЋЮРЋџРЋЮ РЋџРЋљРЋЮ РЋџРЋљРЋЮ  #
#############################################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

bind = $mainMod, Q, killactive,
bind = $mainMod, T, exec, $terminal
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, D, exec, $menu
bind = $mainMod, F, fullscreen, 0
bind = $mainMod, J, layoutmsg, togglesplit
bind = $mainMod, C, exec, swaync-client -t
bind = $mainMod, R, exec, ~/.cargo/bin/hypr-presto

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# swap windows
bind = $mainMod SHIFT, H, swapwindow, l
bind = $mainMod SHIFT, L, swapwindow, r

bind = $mainMod SHIFT, D, exec, ~/dotfiles/script/toggle_visual.sh

# screenshot
## active window
bind = , PRINT, exec, hyprshot -m window -m active --freeze
## region
bind = CONTROL SHIFT, S, exec, hyprshot -m region --freeze
## output
bind = $mainMod, PRINT, exec, hyprshot -m output

# toggle msg ws
bind = $mainMod, S, togglespecialworkspace, Msg
bind = $mainMod SHIFT, S, movetoworkspace, special:Msg

# toggle ScrPad ws
bind = $mainMod, grave, togglespecialworkspace, ScrPad
bind = $mainMod SHIFT, grave, movetoworkspace, special:ScrPad
bind = $mainMod, backslash, togglespecialworkspace, ScrPad
bind = $mainMod SHIFT, backslash, movetoworkspace, special:ScrPad

# random wallpapers
bind = $mainMod, W, exec, ~/dotfiles/script/cycle_wallpaper.sh
# safe wallpaper
bind = $mainMod SHIFT, W, exec, ~/dotfiles/.config/hypr/safe_wallpaper.sh

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Immediately lock
bind = $mainMod, L, exec, hyprlock

# cliphist
bind = $mainMod SHIFT, V, exec, cliphist list | fuzzel --dmenu | cliphist decode | wl-copy

# zoom in
binde = $mainMod, equal, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '.float * 1.1')
# zoom out
binde = $mainMod, minus, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '(.float * 0.9) | if . < 1 then 1 else . end')
# reset zoom
bind = $mainMod ALT, 0, exec, hyprctl keyword cursor:zoom_factor 1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 3%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 3%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 3%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 3%-
bindel = ,XF86LinkPhone, workspace, e+1

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
bindl = , XF86Favorites, exec, playerctl play-pause
bindl = $mainMod, k, exec, playerctl play-pause

# Trigger when the switch is turning on
bindl = , switch:on:Lid Switch, exec, ~/.config/hypr/handle_lid.sh close
# Trigger when the switch is turning off
bindl = , switch:off:Lid Switch, exec, ~/.config/hypr/handle_lid.sh open

####################################################
#  РЋд РЋд РЋд РЋћРЋЌРЋћ РЋћРЋдРЋЌ РЋћРЋљРЋЌ РЋд РЋд      РЋдРЋљРЋЌ РЋд РЋд РЋд   РЋћРЋљРЋЌ РЋћРЋљРЋЌ  #
#  РЋЉРЋЉРЋЉ РЋЉ РЋЉРЋЉРЋЉ  РЋЉРЋЉ РЋЉ РЋЉ РЋЉРЋЉРЋЉ      РЋаРЋдРЋЮ РЋЉ РЋЉ РЋЉ   РЋЉРЋБ  РЋџРЋљРЋЌ  #
#  РЋџРЋЕРЋЮ РЋЕ РЋЮРЋџРЋЮ РЋљРЋЕРЋЮ РЋџРЋљРЋЮ РЋџРЋЕРЋЮ      РЋЕРЋџРЋљ РЋџРЋљРЋЮ РЋЕРЋљРЋЮ РЋџРЋљРЋЮ РЋџРЋљРЋЮ  #
####################################################

# pip
windowrulev = float, title:^(Picture-in-Picture)$
windowrulev = pin, title:^(Picture-in-Picture)$
windowrulev = noinitialfocus, title:^(Picture-in-Picture)$

windowrule = match:class .*blueman-manager.*, float true
windowrule = match:class .*pavucontrol.*, float true
windowrule = match:class .*pavucontrol.*, size 800 600
windowrule = match:class .*pavucontrol.*, center true
windowrule = match:title ^(Pop-Up Tool)$, float true

windowrule = match:class ^(dev-float)$, float true
windowrule = match:class ^(dev-float)$, center true
windowrule = match:class ^(dev-float)$, size 1200 900

windowrule = match:title ^(dev-float)$, float true
windowrule = match:title ^(dev-float)$, center true
windowrule = match:title ^(dev-float)$, size 1200 1100


